<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduManage</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 
         LOGIN SCREEN
         PURPOSE: User authentication and role selection
         FUNCTIONALITY:
         - Validates user credentials
         - Determines user role (admin/teacher/student)
         - Provides demo accounts for testing -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="login-card">
                <!-- Login header with system branding -->
                <div class="login-header">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>EduManage</h1>
                    <p>Education Management System</p>
                </div>
                
                <!-- Login form with authentication fields -->
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                    </div>
                    <div class="form-group">
                        <label for="role">Login as</label>
                        <select id="role" name="role" required>
                            <option value="">Select Role</option>
                            <option value="admin">Administrator</option>
                            <option value="teacher">Teacher</option>
                            <option value="student">Student</option>
                        </select>
                    </div>
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        Login
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript for login functionality -->
    <script src="../js/script.js"></script>
</body>
</html>
